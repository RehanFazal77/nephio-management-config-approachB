# OAI Core - NRF (deploy BEFORE other NFs)
apiVersion: config.porch.kpt.dev/v1alpha1
kind: PackageVariant
metadata:
  name: oai-nrf-ran
spec:
  upstream:
    repo: oai-core-packages
    package: oai-nrf
  downstream:
    repo: nephio-ran
    package: oai-nrf
  annotations:
    approval.nephio.org/policy: initial
  injectors:
  - group: infra.nephio.org
    version: v1alpha1
    kind: WorkloadCluster
    name: ran

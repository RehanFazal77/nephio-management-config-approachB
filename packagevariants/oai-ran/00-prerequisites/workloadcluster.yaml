# WorkloadCluster CR for the target RAN cluster
# Defines CNI type and master interface for VLAN/macvlan traffic
# Apply on the management cluster
apiVersion: infra.nephio.org/v1alpha1
kind: WorkloadCluster
metadata:
  name: ran
  labels:
    nephio.org/cluster-type: ran
    nephio.org/site: ran
spec:
  clusterName: ran
  cnis:
  - macvlan
  masterInterface: eno49

# IPPrefixes for SD-Core deployment on "core" cluster
# These allocate IP subnets for each network interface
# Apply on the management cluster AFTER networks-update.yaml
# Uses cluster-name: core (separate from OAI-RAN's cluster-name: ran)
---
# N2 - AMF (NGAP signaling) on vpc-ran
apiVersion: ipam.resource.nephio.org/v1alpha1
kind: IPPrefix
metadata:
  name: vpc-ran-n2-core
  labels:
    nephio.org/address-family: ipv4
    nephio.org/cluster-name: core
    nephio.org/network-name: n2
spec:
  prefix: 172.2.1.0/24
  networkInstance:
    name: vpc-ran
---
# N3 - UPF (GTP-U user data) on vpc-ran
apiVersion: ipam.resource.nephio.org/v1alpha1
kind: IPPrefix
metadata:
  name: vpc-ran-n3-core
  labels:
    nephio.org/address-family: ipv4
    nephio.org/cluster-name: core
    nephio.org/network-name: n3
spec:
  prefix: 172.3.1.0/24
  networkInstance:
    name: vpc-ran
---
# N4 - SMF↔UPF (PFCP control) on vpc-internal
apiVersion: ipam.resource.nephio.org/v1alpha1
kind: IPPrefix
metadata:
  name: vpc-internal-n4-core
  labels:
    nephio.org/address-family: ipv4
    nephio.org/cluster-name: core
    nephio.org/network-name: n4
spec:
  prefix: 172.1.1.0/24
  networkInstance:
    name: vpc-internal
---
# N6 - UPF internet exit on vpc-internet
apiVersion: ipam.resource.nephio.org/v1alpha1
kind: IPPrefix
metadata:
  name: vpc-internet-n6-core
  labels:
    nephio.org/address-family: ipv4
    nephio.org/cluster-name: core
    nephio.org/network-name: n6
spec:
  prefix: 172.0.0.0/24
  networkInstance:
    name: vpc-internet
